<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main">
        
        <div class="player-container">
            <input type="text" class="score" id="playerOne" value="Score: 0" disabled>
            <input type="text" value="Player One:">
            <p>X</p>
        </div>

        <div class="center">
            <div class="turn"></div>
            
            <div class="board"></div>
            <div class = "controls">
                <button class="restart" id="restart">Restart</button>
                <button class="reset" id="reset">Reset</button>
            </div>
        </div>

        
        <div class="player-container">
            <input type="text" class="score" id="playerTwo" value="Score: 0" disabled>
            <input type="text" value="Player TWO:">
            <p>Y</p>
        </div>

    </div>

</body>
</html>
